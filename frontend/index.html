<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B3B6F"/>
    <meta name="description" content="PropAI - The UK's Smartest AI-Powered Property Platform"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <title>PropAI - Find Your Perfect Home with AI</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      Must load before main.jsx: populates window.__ENV__ with runtime
      config (API_URL etc.) generated by docker-entrypoint.sh at container
      startup. See frontend/src/utils/runtime-config.js for how this is
      consumed, and frontend/env.template.js / Dockerfile for how it's
      generated. In local `npm run dev`, this file won't exist (404s
      harmlessly) and runtime-config.js falls back to
      import.meta.env.VITE_API_URL instead.
    -->
    <script src="/env.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
