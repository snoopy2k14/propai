server:
  port: 8082

spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://propai:propai_secret@localhost:27017/propai_user_service?authSource=admin}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:propai_redis}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.propai.*"
        group.protocol: consumer
  cache:
    type: redis
    redis:
      time-to-live: 300000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.propai: DEBUG
    org.apache.kafka: WARN

propai:
  ai:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${PROPAI_AI_MODEL:claude-sonnet-4-6}
  security:
    jwt:
      secret: ${JWT_SECRET:propai_jwt_secret_change_in_production}
