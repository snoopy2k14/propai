server:
  port: 8080
spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:propai_redis}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
            - id: property-service
              uri: lb://property-service
              predicates: [Path=/api/v1/properties/**]
        - id: user-service
          uri: lb://user-service
          predicates: ["Path=/api/v1/users/**,/api/v1/auth/**"]
        - id: search-service
          uri: lb://search-service
          predicates: [Path=/api/v1/search/**]
        - id: enquiry-service
          uri: lb://enquiry-service
          predicates: [Path=/api/v1/enquiries/**]
        - id: ai-chat-service
          uri: lb://ai-chat-service
          predicates: [Path=/api/v1/chat/**]
        - id: ai-chat-ws
          uri: lb:ws://ai-chat-service
          predicates: [Path=/ws/**]
        - id: analytics-service
          uri: lb://analytics-service
          predicates: [Path=/api/v1/analytics/**]
        - id: notification-service
          uri: lb://notification-service
          predicates: [Path=/api/v1/notifications/**]
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ["http://localhost:3000","https://propai.co.uk","https://www.propai.co.uk"]
            allowedMethods: [GET,POST,PUT,PATCH,DELETE,OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
resilience4j:
  circuitbreaker:
    instances:
      propertyCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
propai:
  security:
    jwt:
      secret: ${JWT_SECRET:propai_jwt_secret_change_in_production}
    public-paths:
      - /api/v1/auth/**
      - /api/v1/properties/search
      - /api/v1/properties/featured
      - /api/v1/search/**
      - /ws/**
      - /actuator/**
      - /fallback/**
