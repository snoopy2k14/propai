apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: propai-ingress
  namespace: propai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  tls:
    - hosts: [propai.co.uk, www.propai.co.uk, api.propai.co.uk]
      secretName: propai-tls-secret
  rules:
    - host: www.propai.co.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend-service, port: { number: 80 } }
    - host: api.propai.co.uk
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 8080 } }
          - path: /ws/
            pathType: Prefix
            backend:
              service: { name: ai-chat-service, port: { number: 8085 } }
