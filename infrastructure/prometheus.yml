global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'propai-services'
    static_configs:
      - targets:
          - property-service:8081
          - user-service:8082
          - search-service:8083
          - enquiry-service:8084
          - ai-chat-service:8085
          - analytics-service:8086
          - notification-service:8087
          - api-gateway:8080
          - eureka-server:8761
    metrics_path: /actuator/prometheus

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb:27017']
