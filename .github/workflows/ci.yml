name: PropAI CI/CD

on:
  push:
    branches:
      - '**'

env:
  REGISTRY: ghcr.io
  # ghcr.io requires lowercase image names; github.repository_owner/repository
  # are usually already lowercase but we normalize defensively in each step.

jobs:
  # ---------------------------------------------------------------------------
  # Build + test each of the 9 Spring Boot backend services in parallel.
  # ---------------------------------------------------------------------------
  backend-test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - property-service
          - search-service
          - enquiry-service
          - ai-chat-service
          - analytics-service
          - notification-service
          - api-gateway
          - eureka-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: backend/${{ matrix.service }}/pom.xml

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        run: mvn -B -ntp test

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build + test the frontend.
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Test (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --watch=false --passWithNoTests
        env:
          CI: true

      - name: Build
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Build + push Docker images to GHCR. Only runs on master, and only after
  # the corresponding tests have passed.
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: Docker build & push (${{ matrix.service }})
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - property-service
          - search-service
          - enquiry-service
          - ai-chat-service
          - analytics-service
          - notification-service
          - api-gateway
          - eureka-server
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine build context
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "context=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "context=backend/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/propai-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
