{{- if .Values.externalSecrets.enabled }}
---
# ServiceAccount with IRSA annotation — lets ESO assume an AWS IAM role
# to read from SSM Parameter Store without static credentials.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalSecrets.serviceAccountName }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.externalSecrets.irsaRoleArn | quote }}
---
# SecretStore — tells ESO how to reach AWS SSM in this region, using the SA above.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: propai-ssm-store
  namespace: {{ .Values.global.namespace }}
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.externalSecrets.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.externalSecrets.serviceAccountName }}
---
# ExternalSecret — syncs SSM parameters into the propai-secrets k8s Secret
# that all the Deployments already reference via secretKeyRef.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: propai-secrets
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: propai-ssm-store
    kind: SecretStore
  target:
    name: propai-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/jwt-secret
    - secretKey: anthropic-api-key
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/anthropic-api-key
    - secretKey: redis-password
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/redis-password
    {{- range $svc := .Values.springServices }}
    {{- if $svc.mongoDb }}
    - secretKey: mongodb-uri-{{ $svc.name }}
      remoteRef:
        key: {{ $.Values.externalSecrets.ssmPrefix }}/mongodb-uri-{{ $svc.name }}
    {{- end }}
    {{- end }}
{{- end }}