apiVersion: v1
kind: Secret
metadata:
  name: propai-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  redis-password: {{ .Values.redis.password | quote }}
  {{- range $svc := .Values.springServices }}
  {{- if $svc.mongoDb }}
  mongodb-uri-{{ $svc.name }}: "mongodb://{{ $.Values.secrets.mongoUsername }}:{{ $.Values.secrets.mongoPassword }}@mongodb:27017/{{ $svc.mongoDb }}?authSource=admin"
  {{- end }}
  {{- end }}
